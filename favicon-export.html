<!DOCTYPE html>
<html>
<head><title>Favicon Export</title></head>
<body style="margin:2rem;font-family:system-ui;color:#2b2d42;">
  <h2>Right-click the image below and "Save Image As" to download the 512x512 PNG</h2>
  <canvas id="c" width="512" height="512" style="border:1px solid #eee;border-radius:12px;"></canvas>
  <br><br>
  <a id="dl" download="crestwood-favicon.png" style="display:inline-block;padding:0.75rem 1.5rem;background:linear-gradient(135deg,#7ea6f4,#a78bfa,#d4a5c9);color:#fff;font-weight:600;border-radius:12px;text-decoration:none;cursor:pointer;">Download PNG</a>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const size = 512;
    const r = 112;

    // Rounded rect background with gradient
    const grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, '#7ea6f4');
    grad.addColorStop(0.5, '#a78bfa');
    grad.addColorStop(1, '#d4a5c9');

    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // Shield outer
    ctx.beginPath();
    ctx.moveTo(256, 80);
    ctx.lineTo(400, 140);
    ctx.lineTo(400, 280);
    ctx.quadraticCurveTo(400, 380, 256, 440);
    ctx.quadraticCurveTo(112, 380, 112, 280);
    ctx.lineTo(112, 140);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 6;
    ctx.stroke();

    // Shield inner
    ctx.beginPath();
    ctx.moveTo(256, 120);
    ctx.lineTo(370, 168);
    ctx.lineTo(370, 275);
    ctx.quadraticCurveTo(370, 358, 256, 406);
    ctx.quadraticCurveTo(142, 358, 142, 275);
    ctx.lineTo(142, 168);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fill();

    // Letter C
    ctx.font = '700 200px -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('C', 256, 272);

    // Download link
    document.getElementById('dl').href = canvas.toDataURL('image/png');
  </script>
</body>
</html>
